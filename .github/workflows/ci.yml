name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install test dependencies
        run: |
          python -m pip install pandas numpy scipy scikit-learn openpyxl pyyaml pytest

      - name: Run tests
        run: |
          python -m py_compile tests/test_schema.py
          pytest tests/test_schema.py -q